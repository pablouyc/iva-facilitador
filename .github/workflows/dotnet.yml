name: .NET CI
on:
  push:
    branches: [ main, '**/*' ]
  pull_request:
    branches: [ main ]
jobs:
  build_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore IvaFacilitador.sln
      - run: dotnet build IvaFacilitador.sln -c Release --no-restore
      - run: dotnet test  IvaFacilitador.sln -c Release --no-build
